<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Dollar Clicker Mobile</title>
    <style>
        body {
            margin: 0; padding: 0; background: linear-gradient(135deg, #0b2516, #05110a);
            color: white; font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: manipulation; position: relative;
        }
        #score-container { font-size: 36px; font-weight: bold; margin-bottom: 25px; text-shadow: 0 0 15px rgba(46, 204, 113, 0.6); z-index: 10; }
        #coin-wrapper { position: relative; z-index: 5; }
        #coin {
            width: 210px; height: 210px; background: radial-gradient(circle, #f1c40f, #d4ac0d);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 100px; font-weight: bold; color: #1e5631; cursor: pointer;
            box-shadow: 0 12px 30px rgba(241, 196, 15, 0.5);
            transition: transform 0.05s ease; border: 6px solid #f9e79f;
            -webkit-tap-highlight-color: transparent;
        }
        #coin:active { transform: scale(0.90); }
        .flying-item {
            position: absolute; font-size: 34px; pointer-events: none;
            animation: flyUp 0.8s ease-out forwards; z-index: 100;
        }
        @keyframes flyUp {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="score-container">💰 $<span id="score">0</span></div>
    <div id="coin-wrapper">
        <div id="coin">$</div>
    </div>

    <script>
        let score = 0;
        let lastClickTime = Date.now();
        let clickSpeed = 0;

        const scoreDisplay = document.getElementById('score');
        const coin = document.getElementById('coin');

        const itemsTier1 = ['🪙', '💵'];       
        const itemsTier2 = ['💰', '💳'];       
        const itemsTier3 = ['👑', '💎', '🚀']; 

        // Функція обробки натискання (працює і на ПК, і на смартфонах)
        function handleTap(e) {
            e.preventDefault(); // Захист від подвійного зуму на смартфонах
            
            const now = Date.now();
            const timeDiff = now - lastClickTime;
            lastClickTime = now;

            if (timeDiff < 350) {
                clickSpeed = Math.min(clickSpeed + 1, 15);
            } else {
                clickSpeed = Math.max(clickSpeed - 2, 0);
            }

            let selectedItem = '';
            let reward = 1;

            if (clickSpeed > 10) {
                selectedItem = itemsTier3[Math.floor(Math.random() * itemsTier3.length)];
                reward = 10;
            } else if (clickSpeed > 4) {
                selectedItem = itemsTier2[Math.floor(Math.random() * itemsTier2.length)];
                reward = 3;
            } else {
                selectedItem = itemsTier1[Math.floor(Math.random() * itemsTier1.length)];
                reward = 1;
            }

            score += reward;
            scoreDisplay.textContent = score;

            // Визначаємо координати пальця або мишки
            let clickX, clickY;
            if (e.touches && e.touches.length > 0) {
                clickX = e.touches[0].clientX;
                clickY = e.touches[0].clientY;
            } else {
                clickX = e.clientX;
                clickY = e.clientY;
            }

            createFlyingItem(selectedItem, clickX, clickY);
        }

        // Слухаємо тапи пальцями та кліки мишкою
        coin.addEventListener('touchstart', handleTap, { passive: false });
        coin.addEventListener('click', handleTap);

        unction createFlyingItem(emoji, x, y) {
            const item = document.createElement('div');
            item.className = 'flying-item';
            item.textContent = emoji;

            // Якщо координати не зчиталися, беремо центр екрана
            const finalX = x ? x : window.innerWidth / 2;
            const finalY = y ? y : window.innerHeight / 2;

            item.style.left = ${finalX}px;
            item.style.top = ${finalY}px;

            const randomX = (Math.random() - 0.5) * 160; 
            const randomY = -150 - Math.random() * 120;  

            item.style.setProperty('--x', ${randomX}px);
            item.style.setProperty('--y', ${randomY}px);

            document.body.appendChild(item);

            setTimeout(() => { item.remove(); }, 800);
        }

        setInterval(() => {
            if (Date.now() - lastClickTime > 600) {
                clickSpeed = Math.max(clickSpeed - 1, 0);
            }
        }, 300);
    </script>
</body>
</html>
